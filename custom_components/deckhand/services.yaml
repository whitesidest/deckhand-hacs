reboot:
  name: Reboot
  description: Reboot a Deckhand dial.
  fields:
    device_id:
      name: Device
      description: The Deckhand dial device to reboot.
      required: true
      selector:
        device:
          integration: deckhand

set_timezone:
  name: Set Timezone
  description: >
    Set the per-dial timezone. Accepts an IANA name (e.g.
    "America/Los_Angeles") which is converted to a POSIX TZ string
    before being published over MQTT — the firmware passes that string
    straight to setenv("TZ", ...) so the clock face and any time
    rendering immediately reflect the new zone. Schedules continue to
    fire correctly because the wire format is epoch.
  fields:
    device_id:
      name: Device
      description: The Deckhand dial device to retime.
      required: true
      selector:
        device:
          integration: deckhand
    timezone:
      name: IANA Timezone
      description: IANA name like "America/New_York" or "Europe/Paris".
      required: true
      example: "America/New_York"
      selector:
        select:
          options:
            - "UTC"
            - "America/Los_Angeles"
            - "America/Vancouver"
            - "America/Denver"
            - "America/Phoenix"
            - "America/Chicago"
            - "America/Mexico_City"
            - "America/New_York"
            - "America/Toronto"
            - "America/Anchorage"
            - "America/Sao_Paulo"
            - "Pacific/Honolulu"
            - "Europe/London"
            - "Europe/Paris"
            - "Europe/Berlin"
            - "Europe/Madrid"
            - "Europe/Rome"
            - "Europe/Amsterdam"
            - "Europe/Stockholm"
            - "Europe/Athens"
            - "Africa/Cairo"
            - "Africa/Johannesburg"
            - "Asia/Dubai"
            - "Asia/Kolkata"
            - "Asia/Singapore"
            - "Asia/Hong_Kong"
            - "Asia/Shanghai"
            - "Asia/Seoul"
            - "Asia/Tokyo"
            - "Australia/Perth"
            - "Australia/Brisbane"
            - "Australia/Sydney"
            - "Australia/Melbourne"
            - "Pacific/Auckland"

apply_overlay:
  name: Apply Overlay
  description: >
    Apply a partial theme overlay to a dial without replacing the current
    theme. Handy for reactive automations — e.g. "flash Lightning subtitle
    when WeatherFlow detects nearby strikes". Any field left unset keeps
    the dial's current value.
  fields:
    device_id:
      name: Device
      description: The Deckhand dial device to target.
      required: true
      selector:
        device:
          integration: deckhand
    subtitle_mode:
      name: Subtitle mode
      description: theme | custom | date | date_year | none
      example: "custom"
      selector:
        select:
          options:
            - "theme"
            - "custom"
            - "date"
            - "date_year"
            - "none"
    subtitle_text:
      name: Subtitle text
      description: >
        Custom text under the clock. Setting this without picking a
        subtitle_mode automatically switches the dial to "custom" so the
        text appears.
      example: "⚡ Lightning detected"
      selector:
        text:
    home_face:
      name: Home face
      description: theme | clock | message | sensor | image | blank
      example: "message"
      selector:
        select:
          options:
            - "theme"
            - "clock"
            - "message"
            - "sensor"
            - "image"
            - "blank"
    home_message:
      name: Home message
      description: Large message shown when home_face is "message".
      example: "Storm warning"
      selector:
        text:
    sensor_entity_id:
      name: Sensor entity ID
      description: >
        HA entity to display when home_face is "sensor". The integration
        publishes the entity's current value automatically, then keeps
        the dial in sync as the value changes.
      example: "sensor.living_room_temperature"
      selector:
        entity:
    sensor_label:
      name: Sensor label
      description: Display label for the sensor face (slot 1).
      example: "Living Room"
      selector:
        text:
    sensor_quad_2_entity_id:
      name: Quad slot 2 entity
      description: HA entity for the second quadrant of the sensor face.
      selector:
        entity:
    sensor_quad_2_label:
      name: Quad slot 2 label
      selector:
        text:
    sensor_quad_3_entity_id:
      name: Quad slot 3 entity
      description: HA entity for the third quadrant of the sensor face.
      selector:
        entity:
    sensor_quad_3_label:
      name: Quad slot 3 label
      selector:
        text:
    sensor_quad_4_entity_id:
      name: Quad slot 4 entity
      description: HA entity for the fourth quadrant of the sensor face.
      selector:
        entity:
    sensor_quad_4_label:
      name: Quad slot 4 label
      selector:
        text:
    sensor_marquee:
      name: Marquee entities
      description: >
        Up to 12 sensors that scroll across the dial as a marquee.
        Pass a YAML list of either bare entity ids
        (e.g. `- sensor.outdoor_temp`) or per-entry objects
        (`- entity_id: sensor.x` / `label: "..."` / `unit: "°F"`).
      example: |
        - sensor.outdoor_temp
        - entity_id: sensor.living_humidity
          label: "Humidity"
        - entity_id: sensor.battery_pct
          label: "Battery"
          unit: "%"
      selector:
        object:
    marquee_position:
      name: Marquee position
      description: Where the scrolling marquee renders on the dial face.
      default: subtitle
      selector:
        select:
          options:
            - subtitle
            - ring
    brightness:
      name: Brightness
      description: Display brightness override (0-100).
      selector:
        number:
          min: 0
          max: 100
          unit_of_measurement: "%"
    hide_label:
      name: Hide Label
      description: >
        When true, the dial stops rendering its label above the clock.
        One-shot — survives until the next overlay or reboot. To make
        the change persistent, save the dial-level "Hide Label" setting
        in Helm or Console.
      selector:
        boolean:
    ttl_s:
      name: TTL (seconds)
      description: >
        If set, the firmware reverts to the last full theme after this
        many seconds. Omit or set to 0 for a sticky overlay.
      selector:
        number:
          min: 0
          max: 86400
          unit_of_measurement: seconds

update_now_playing:
  name: Update Now Playing
  description: >
    Stream a now-playing update to a dial's home face. Lightweight,
    high-frequency — fire on track change, not on every progress tick.
    Leave title blank to revert the dial to its theme-default home face.
    Ephemeral — not persisted across reboot.
  fields:
    device_id:
      name: Device
      description: The Deckhand dial device to target.
      required: true
      selector:
        device:
          integration: deckhand
    title:
      name: Track title
      description: Blank reverts the dial to its theme-default home face.
      example: "Dreams"
      selector:
        text:
    artist:
      name: Artist
      example: "Fleetwood Mac"
      selector:
        text:
    album_art_url:
      name: Album art URL
      description: Optional — the dial will attempt to fetch and display.
      selector:
        text:
    source:
      name: Source label
      description: e.g. "Spotify", "Sonos", "AirPlay".
      example: "Spotify"
      selector:
        text:
    is_playing:
      name: Is playing
      description: When false, the face stays visible but dimmed.
      default: true
      selector:
        boolean:
    entity_id:
      name: Source entity (optional)
      description: >
        HA media_player entity id this update represents. When set, a
        play/pause click on the dial controls THIS entity. When omitted,
        the dial falls back to the room's default media_player binding.
      example: "media_player.jellyfin_galaxy_tab"
      selector:
        entity:
          domain: media_player

update_from_media_player:
  name: Update From Media Player
  description: >
    Read the current state of a media_player entity and stream it to a
    Deckhand dial's now-playing face. Handles title, artist (or series
    title for video), album art / poster, source, and playback state.
    For always-on auto-push, configure a binding in the integration's
    options instead of calling this service manually.
  fields:
    device_id:
      name: Device
      description: The Deckhand dial device to target.
      required: true
      selector:
        device:
          integration: deckhand
    entity_id:
      name: Media Player
      description: The media_player entity to mirror.
      required: true
      example: "media_player.living_room_tv"
      selector:
        entity:
          domain: media_player

update_sensor_value:
  name: Update Sensor Value
  description: >
    Stream a sensor value update to a dial. Refreshes the sensor home face
    in place when visible, otherwise buffered. Ephemeral.
  fields:
    device_id:
      name: Device
      description: The Deckhand dial device to target.
      required: true
      selector:
        device:
          integration: deckhand
    entity_id:
      name: Source entity
      description: HA entity id this reading belongs to.
      required: true
      example: "sensor.living_room_temp"
      selector:
        entity:
    label:
      name: Label
      description: Short label shown above the value.
      example: "Living Room"
      selector:
        text:
    value:
      name: Value
      description: String or number. Rendered verbatim on the dial.
      required: true
      example: "72"
      selector:
        text:
    unit:
      name: Unit
      example: "°F"
      selector:
        text:
    icon:
      name: Icon
      description: Optional FontAwesome-style glyph id for future use.
      example: "fa-thermometer-half"
      selector:
        text:
    color:
      name: Tint color
      description: Hex string like "#FFD700" to tint the value display.
      example: "#FFD700"
      selector:
        text:
