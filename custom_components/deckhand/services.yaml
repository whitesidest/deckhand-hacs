send_announcement:
  name: Send Announcement
  description: Send an announcement message to a Deckhand dial.
  fields:
    device_id:
      name: Device
      description: The Deckhand dial device to send the announcement to.
      required: true
      selector:
        device:
          integration: deckhand
    message:
      name: Message
      description: The announcement message to display.
      required: true
      example: "Dinner is ready!"
      selector:
        text:
    from_name:
      name: From
      description: Who the announcement is from.
      default: "Home Assistant"
      selector:
        text:
    duration:
      name: Duration
      description: How long to display the announcement (seconds).
      default: 30
      selector:
        number:
          min: 5
          max: 300
          unit_of_measurement: seconds
    animation:
      name: Animation
      description: >
        Visual effect to play behind the announcement. Aesthetic keys
        (sparkle, snow, …) inherit the dial's theme accent. Semantic
        keys (signal:*) carry meaning — color and haptic are theme-
        invariant. signal:emergency adds a haptic pulse.
      default: "none"
      selector:
        select:
          options:
            - "none"
            - sparkle
            - flash
            - fireworks
            - magic_spell
            - fire
            - waves
            - rain
            - opening_flower
            - falling_leaves
            - confetti
            - snow
            - aurora
            - ripple
            - "signal:ready"
            - "signal:question"
            - "signal:available"
            - "signal:timed_state"
            - "signal:overdue"
            - "signal:comfort"
            - "signal:priority"
            - "signal:emergency"
            - "signal:dnd"

send_countdown:
  name: Send Countdown
  description: >
    Schedule a countdown announcement on a Deckhand dial. The dial shows
    a live counter ticking down to the target moment, then transitions
    to a celebration message + animation at T=0. Optionally swaps to a
    celebration theme at the same moment.
  fields:
    device_id:
      name: Device
      description: The Deckhand dial device to target.
      required: true
      selector:
        device:
          integration: deckhand
    target_datetime:
      name: Target Moment
      description: When the countdown reaches zero (the celebration moment).
      required: true
      example: "2026-12-31T23:59:59"
      selector:
        datetime:
    message:
      name: Countdown Message
      description: Text shown small below the live counter during the countdown.
      example: "Almost there..."
      selector:
        text:
    celebration_message:
      name: Celebration Message
      description: Text shown when the countdown hits zero.
      required: true
      example: "Happy New Year!"
      selector:
        text:
    celebration_animation:
      name: Celebration Animation
      description: Visual effect that fires at T=0.
      default: "fireworks"
      selector:
        select:
          options:
            - "none"
            - sparkle
            - flash
            - fireworks
            - magic_spell
            - fire
            - waves
            - rain
            - opening_flower
            - falling_leaves
            - confetti
            - snow
            - aurora
            - ripple
    celebration_theme:
      name: Celebration Theme
      description: >
        Optional theme to push at T=0. Leave blank to keep the dial's
        current theme.
      example: "royale"
      selector:
        select:
          mode: dropdown
          custom_value: true
          sort: false
          options:
